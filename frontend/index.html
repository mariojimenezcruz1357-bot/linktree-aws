<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Linktree | AWS Cloud</title>
    <meta name="description" content="Ingeniero Cloud y Desarrollador Full-Stack. Descubre mi portafolio, GitHub y más.">
    
    <!-- Open Graph / Redes Sociales -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://dtjihsx7z4g09.cloudfront.net/">
    <meta property="og:title" content="Mario Jiménez Cruz | Linktree Profesional">
    <meta property="og:description" content="Ingeniero Cloud y Desarrollador Full-Stack. Descubre mi portafolio, GitHub y más.">
    <meta property="og:image" content="https://dtjihsx7z4g09.cloudfront.net/images/icono.jpeg">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://dtjihsx7z4g09.cloudfront.net/">
    <meta property="twitter:title" content="Mario Jiménez Cruz | Linktree Profesional">
    <meta property="twitter:description" content="Ingeniero Cloud y Desarrollador Full-Stack. Descubre mi portafolio, GitHub y más.">
    <meta property="twitter:image" content="https://dtjihsx7z4g09.cloudfront.net/images/icono.jpeg">
    <link rel="stylesheet" href="style.css">
    <!-- Fuentes modernas de Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- Iconos -->
    <script src="https://unpkg.com/feather-icons"></script>
</head>
<body>
    <!-- Partículas de fondo animadas (simuladas con CSS en el style) -->
    <div class="background-wrapper">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <main class="container">
        <header class="profile-section">
            <div class="profile-image-container">
                <img src="images/icono.jpeg" alt="Foto de perfil" class="profile-image">
                <div class="status-badge" title="Disponible"></div>
            </div>
            <h1 class="profile-name">Mario Jiménez Cruz</h1>
            <p class="profile-bio">Ingeniero Cloud y Desarrollador Full-Stack</p>
        </header>

        <section class="links-section" id="links-container">
            <!-- Los links se inyectarán aquí vía JavaScript -->
            <div class="loader">
                <i data-feather="loader" class="spin"></i> 
                <span>Cargando perfil...</span>
            </div>
        </section>

        <footer class="footer">
            <div class="footer-socials">
                <a href="#" class="social-icon" aria-label="Twitter"><i data-feather="twitter"></i></a>
                <a href="#" class="social-icon" aria-label="Instagram"><i data-feather="instagram"></i></a>
                <a href="#" class="social-icon" aria-label="GitHub"><i data-feather="github"></i></a>
                <a href="#" class="social-icon" aria-label="Mail"><i data-feather="mail"></i></a>
            </div>
            <p>Diseñado por Mario Jiménez</p>
            <p>Powered by <strong>AWS Serverless</strong> & <strong>GitHub Actions</strong></p>
        </footer>
    </main>

    <script src="app.js"></script>
</body>
</html>
