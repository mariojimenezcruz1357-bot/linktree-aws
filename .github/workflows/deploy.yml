name: Deploy Linktree to AWS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup AWS SAM CLI
        uses: aws-actions/setup-sam@v2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: SAM Build
        run: sam build

      - name: SAM Deploy
        run: |
          sam deploy --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --stack-name mi-linktree-stack \
            --capabilities CAPABILITY_IAM \
            --resolve-s3 \
            --region us-east-1

      - name: Seed DynamoDB with Initial Data
        run: |
          TABLE_NAME=$(aws cloudformation describe-stack-resource --stack-name mi-linktree-stack --logical-resource-id LinksTable --query "StackResourceDetail.PhysicalResourceId" --output text)
          echo "Poblando tabla DynamoDB: $TABLE_NAME"
          
          # Insertar o actualizar links iniciales
          aws dynamodb put-item --table-name $TABLE_NAME --item '{"id": {"S": "1"}, "title": {"S": "Mi Portafolio"}, "subtitle": {"S": "Proyectos y experiencia"}, "url": {"S": "https://mariojimenez.com"}, "icon": {"S": "briefcase"}}'
          aws dynamodb put-item --table-name $TABLE_NAME --item '{"id": {"S": "2"}, "title": {"S": "GitHub"}, "subtitle": {"S": "Revisa mi código abierto"}, "url": {"S": "https://github.com/mariojimenezcruz1357-bot"}, "icon": {"S": "github"}}'
          aws dynamodb put-item --table-name $TABLE_NAME --item '{"id": {"S": "3"}, "title": {"S": "LinkedIn"}, "subtitle": {"S": "Conecta conmigo"}, "url": {"S": "https://linkedin.com"}, "icon": {"S": "linkedin"}}'
          aws dynamodb put-item --table-name $TABLE_NAME --item '{"id": {"S": "4"}, "title": {"S": "Twitter"}, "subtitle": {"S": "Mis pensamientos sobre Cloud"}, "url": {"S": "https://twitter.com"}, "icon": {"S": "twitter"}}'
          aws dynamodb put-item --table-name $TABLE_NAME --item '{"id": {"S": "5"}, "title": {"S": "Contáctame"}, "subtitle": {"S": "Hablemos de tu próximo proyecto"}, "url": {"S": "mailto:hola@mariojimenez.com"}, "icon": {"S": "mail"}}'

      - name: Deploy Frontend to S3
        run: |
          # Obtener el nombre del bucket de los outputs de CloudFormation
          BUCKET_NAME=$(aws cloudformation describe-stacks --stack-name mi-linktree-stack --query "Stacks[0].Outputs[?OutputKey=='BucketName'].OutputValue" --output text)
          echo "Desplegando frontend en el bucket: $BUCKET_NAME"
          
          # Sincronizar la carpeta frontend con el bucket S3
          aws s3 sync frontend/ s3://$BUCKET_NAME --delete
